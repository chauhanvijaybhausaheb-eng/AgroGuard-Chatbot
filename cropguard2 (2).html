<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroGuard AI | Smart Crop Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #1a4d2e;
            --accent: #4ade80;
            --bg-soft: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-soft);
            background-image: radial-gradient(circle at top right, #e2f2e9, transparent);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--text-main);
        }

        /* --- Header --- */
        header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { width: 42px; height: 42px; border-radius: 12px; box-shadow: 0 4px 10px rgba(26, 77, 46, 0.2); }
        .logo-area h2 { margin: 0; font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .status-badge { font-size: 0.75rem; background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-weight: 600; }

        /* --- Chat Area --- */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 10% 120px 10%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for Chrome/Safari */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .message {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(26, 77, 46, 0.2);
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--white);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Markdown Styling inside Bot Messages */
        .bot-msg h1, .bot-msg h2 { font-size: 1.1rem; color: var(--primary); margin-top: 0; }
        .bot-msg ul { padding-left: 20px; }

        .msg-img {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            margin-top: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* --- Input Area --- */
        .controls-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            z-index: 100;
        }

        .input-card {
            background: var(--white);
            padding: 12px 16px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn-action {
            background: var(--bg-soft);
            color: var(--text-muted);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover { background: #e2e8f0; color: var(--primary); }

        #send-btn {
            background: var(--primary);
            color: white;
        }

        #send-btn:hover { background: #143a22; transform: scale(1.05); }

        /* --- Preview --- */
        #image-preview-container {
            display: none;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 8px;
            position: relative;
        }

        #img-preview {
            height: 60px;
            width: 60px;
            object-fit: cover;
            border-radius: 10px;
        }

        .remove-img {
            position: absolute;
            top: 5px;
            left: 65px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Loading --- */
        .typing { display: flex; gap: 4px; padding: 10px; }
        .typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="https://cdn-icons-png.flaticon.com/512/628/628283.png" alt="Logo">
        <div>
            <h2>AgroGuard AI</h2>
        </div>
    </div>
    <div class="status-badge">AI Online</div>
</header>

<div id="chat-container">
    <div class="message bot-msg">
        <strong>Welcome to AgroGuard AI!</strong><br>
        I can help you diagnose plant diseases. Try uploading a photo of a leaf or describe the symptoms below.
    </div>
</div>

<div class="controls-container">
    <div class="input-card">
        <div id="image-preview-container">
            <div class="remove-img" onclick="clearImage()">×</div>
            <img id="img-preview" src="">
        </div>

        <div class="input-wrapper">
            <label class="btn-action">
                <input type="file" id="file-input" hidden accept="image/*">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </label>
            
            <input type="text" id="user-prompt" placeholder="Ask about crop health...">
            
            <button class="btn-action" id="send-btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
}
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyBl4OkEbz7egrZsIBYj1lLVeh1IYQewDww"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    
    const fileInput = document.getElementById('file-input');
    const imgPreview = document.getElementById('img-preview');
    const previewContainer = document.getElementById('image-preview-container');
    const sendBtn = document.getElementById('send-btn');
    const userPrompt = document.getElementById('user-prompt');
    const chatContainer = document.getElementById('chat-container');

    let selectedImageData = null;

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (f) => {
                imgPreview.src = f.target.result;
                previewContainer.style.display = 'block';
                selectedImageData = f.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    });

    window.clearImage = () => {
        selectedImageData = null;
        previewContainer.style.display = 'none';
        fileInput.value = '';
    };

    async function handleChat() {
        const text = userPrompt.value.trim();
        if (!text && !selectedImageData) return;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.innerHTML = `<div>${text || "Analyzing Image..."}</div>`;
        
        if(selectedImageData) {
            const img = document.createElement('img');
            img.src = imgPreview.src;
            img.className = 'msg-img';
            userDiv.appendChild(img);
        }
        chatContainer.appendChild(userDiv);
        
        userPrompt.value = '';
        const currentImg = selectedImageData;
        const currentText = text;
        clearImage();
        chatContainer.scrollTop = chatContainer.scrollHeight;

        const botDiv = document.createElement('div');
        botDiv.className = 'message bot-msg';
        botDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        chatContainer.appendChild(botDiv);

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });
            const promptContext = `Act as an expert Plant Pathologist. Use PlantVillage standards. 
            If image provided: Identify plant/disease, give confidence %, organic/chemical cures, prevention.
            If text only: Answer agricultural questions professionally.`;

            const parts = [{ text: promptContext + "\nUser: " + currentText }];
            if (currentImg) parts.push({ inlineData: { mimeType: "image/jpeg", data: currentImg } });

            const result = await model.generateContent(parts);
            botDiv.innerHTML = marked.parse(result.response.text());
        } catch (error) {
            botDiv.innerHTML = "⚠️ Error: Check your API key or connection.";
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    sendBtn.addEventListener('click', handleChat);
    userPrompt.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
</script>
